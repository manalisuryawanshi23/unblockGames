server {
    listen 80;
    listen [::]:80;
    server_name unblockedgameszone.com www.unblockedgameszone.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name unblockedgameszone.com www.unblockedgameszone.com;

    ssl_certificate     /etc/letsencrypt/live/unblockedgameszone.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/unblockedgameszone.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/unblockGames/dist;
    index index.html;

    # ─────────────────────────────────────────────────────────
    # IMAGE PROXY — lets WhatsApp crawler fetch game thumbnails
    # through our server (avoids CDN hotlink protection)
    # ─────────────────────────────────────────────────────────
    location /api/og/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   User-Agent $http_user_agent;
        proxy_cache_valid  200 1h;
    }

    # ─────────────────────────────────────────────────────────
    # GAME PAGE: Route social bots to Express OG proxy.
    # Real users get the React SPA via try_files.
    #
    # WhatsApp preview format (image top + title + desc + url):
    #   og:image        = game thumbnail (via our proxy)
    #   og:title        = "Play {Game} Unblocked..."
    #   og:description  = game description
    #   og:url          = canonical game URL
    # ─────────────────────────────────────────────────────────
    location ~ ^/game/(.+)$ {
        # Capture slug
        set $game_slug $1;

        # If request is from a social bot, send to OG proxy
        if ($http_user_agent ~* "(WhatsApp|facebookexternalhit|Facebot|Twitterbot|TelegramBot|LinkedInBot|Slackbot|Discordbot|Pinterest|Googlebot|bingbot|Applebot|redditbot|vkShare|iframely|Embedly|curl)") {
            proxy_pass http://127.0.0.1:5000/api/og/game/$game_slug;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header User-Agent $http_user_agent;
            break;
        }

        # Normal user: React SPA
        try_files $uri $uri/ /index.html;
    }

    # ─────────────────────────────────────────────────────────
    # API Proxy → Express backend
    # ─────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # ─────────────────────────────────────────────────────────
    # Uploaded blog images
    # ─────────────────────────────────────────────────────────
    location /uploads/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
    }

    # ─────────────────────────────────────────────────────────
    # Static assets with caching
    # ─────────────────────────────────────────────────────────
    location /data/ {
        expires 1d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─────────────────────────────────────────────────────────
    # All other routes → React SPA
    # ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
