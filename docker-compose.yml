version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ugz_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-deergh}
      POSTGRES_DB: unblockgames
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d unblockgames"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: ugz_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-deergh}@db:5432/unblockgames?schema=public
      - JWT_SECRET=${JWT_SECRET:-supersecretjwtkey}
      - SITE_URL=https://unblockedgameszone.com
      - PORT=5000
    volumes:
      - ugz_uploads:/app/uploads
      # Mount public data so the backend OG handler can read the game JSONs
      - ./public/data:/app/public/data:ro

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=https://unblockedgameszone.com
    container_name: ugz_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # Exposes port 8080 on localhost only. 
      # Your Hostinger reverse proxy should forward unblockedgameszone.com to 127.0.0.1:4012
      - "127.0.0.1:4012:80"
    volumes:
      # Mount the static data folder so it can be updated without rebuilding the container
      - ./public/data:/usr/share/nginx/html/data

volumes:
  pgdata:
  ugz_uploads:
