map $http_user_agent $is_social_bot {
    default 0;
    ~*(facebookexternalhit|facebot|whatsapp|twitterbot|telegrambot|linkedinbot|slackbot|discordbot|pinterest|googlebot|bingbot|applebot|redditbot|vkshare|iframely|embedly|w3c_validator|curl|python-requests|axios) 1;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 10M;

    # ─────────────────────────────────────────────────────────
    # API Proxy → Express backend (backend container on port 5000)
    # ─────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # SEO Routes proxy
    location = /sitemap-blog.xml {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
    }
    location = /rss.xml {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
    }

    # ─────────────────────────────────────────────────────────
    # Uploaded blog images — proxy to backend volume
    # ─────────────────────────────────────────────────────────
    location /uploads/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # ─────────────────────────────────────────────────────────
    # GAME PAGES: Social bots → OG proxy (SSR HTML with meta tags)
    # Using the safe "error_page" trick to avoid "If is Evil" bugs
    # ─────────────────────────────────────────────────────────
    location ~ ^/game/([^/]+)$ {
        error_page 418 = @bot_proxy;
        
        if ($is_social_bot) {
            return 418;
        }

        # Real users get the React SPA
        try_files $uri $uri/ /index.html;
    }

    location @bot_proxy {
        rewrite ^/game/([^/]+)$ /api/og/game/$1 break;
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Static assets with caching
    location /data/ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400, stale-while-revalidate=86400";
        try_files $uri =404;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # All other routes → React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
