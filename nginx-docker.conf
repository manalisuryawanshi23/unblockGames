server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─────────────────────────────────────────────────────────
    # IMAGE PROXY — lets WhatsApp crawler fetch game thumbnails
    # through our server (avoids CDN hotlink protection)
    # ─────────────────────────────────────────────────────────
    location /api/og/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   User-Agent $http_user_agent;
        proxy_cache_valid  200 1h;
    }

    # ─────────────────────────────────────────────────────────
    # GAME PAGE: Route social bots to Express OG proxy.
    # Real users get the React SPA via try_files.
    # ─────────────────────────────────────────────────────────
    location ~ ^/game/(.+)$ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header User-Agent $http_user_agent;

        if ($http_user_agent ~* "(WhatsApp|facebookexternalhit|Facebot|Twitterbot|TelegramBot|LinkedInBot|Slackbot|Discordbot|Pinterest|Googlebot|bingbot|Applebot|redditbot|vkShare|iframely|Embedly|curl)") {
            rewrite ^/game/(.+)$ /api/og/game/$1 break;
            proxy_pass http://backend:5000;
        }

        try_files $uri $uri/ /index.html;
    }

    # ─────────────────────────────────────────────────────────
    # API Proxy → Express backend (backend container on port 5000)
    # ─────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # SEO Routes proxy
    location = /sitemap-blog.xml {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
    }
    location = /rss.xml {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
    }

    # Uploaded blog images
    location /uploads/ {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
    }

    # Static assets with caching
    location /data/ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400, stale-while-revalidate=86400";
        try_files $uri =404;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # All other routes → React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
