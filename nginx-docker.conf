server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─────────────────────────────────────────────────────────
    # Detect social media / crawler bots via map
    # ─────────────────────────────────────────────────────────
    # NOTE: map must be in http block, so we use a workaround:
    # we check the user-agent in the location block directly
    # using two separate location blocks — one for bots (prefix),
    # one for real users (fallthrough).

    # ─────────────────────────────────────────────────────────
    # API Proxy → Express backend (backend container on port 5000)
    # ─────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # SEO Routes proxy
    location = /sitemap-blog.xml {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
    }
    location = /rss.xml {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
    }

    # ─────────────────────────────────────────────────────────
    # Uploaded blog images — proxy to backend volume
    # ─────────────────────────────────────────────────────────
    location /uploads/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # ─────────────────────────────────────────────────────────
    # GAME PAGES: Social bots → OG proxy (SSR HTML with meta tags)
    # This block matches ONLY when the User-Agent is a known bot.
    # Real users fall through to the catch-all location below.
    # We use a named location trick to avoid if-in-location issues.
    # ─────────────────────────────────────────────────────────
    location ~ ^/game/([^/]+)$ {
        # For social bots, proxy to backend OG handler
        if ($http_user_agent ~* "(?:facebookexternalhit|facebot|whatsapp|twitterbot|telegrambot|linkedinbot|slackbot|discordbot|pinterest|googlebot|bingbot|applebot|redditbot|vkshare|iframely|embedly|w3c_validator|curl|python-requests|axios)") {
            proxy_pass http://backend:5000/api/og/game/$1;
            break;
        }

        # Real users get the React SPA
        try_files $uri $uri/ /index.html;
    }

    # Static assets with caching
    location /data/ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400, stale-while-revalidate=86400";
        try_files $uri =404;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # All other routes → React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
